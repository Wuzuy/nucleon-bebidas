<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nucleon - Calculadora de Consumo</title>
    <link rel="stylesheet" href="styleCalc.css">
</head>

<body>

    <header class="navbar">
        <div class="container-nav">
            <div class="logo">
                <img src="logo-nucleon.png" alt="" class="logo-img">
                <span>NUCLEON</span>
            </div>
            <nav>
                <a href="#">Produtos</a>
                <a href="#">Sobre</a>
                <a href="#" class="active">Calculadora</a>
                <a href="#"><img src="cart-icon.png" alt="Carrinho" class="icon"></a>
                <a href="#"><img src="user-icon.png" alt="Perfil" class="icon"></a>
            </nav>
        </div>
    </header>

    <main class="content">
        <div class="hero-section">
            <div class="heart-icon">
            </div>
            <h1>Calculadora de Consumo Seguro</h1>
            <p class="subtitle">Descubra seu IMC e o limite diário recomendado de cafeína</p>
        </div>

        <section class="calculator-card">
            <div class="input-group">
                <label for="peso">Peso (kg)</label>
                <input type="number" id="peso" placeholder="Ex: 70">
            </div>

            <div class="input-group">
                <label for="altura">Altura (cm)</label>
                <input type="number" id="altura" placeholder="Ex: 175">
            </div>

            <div class="input-group full-width">
                <label for="cafeina">Cafeína já consumida hoje (mg)</label>
                <input type="number" id="cafeina" placeholder="Ex: 160 (equivalente a 1 lata)">
                <span class="hint">💡 Uma lata de Nucleon tem 160mg de cafeína</span>
            </div>

            <button class="btn-calculate">CALCULAR</button>
        </section>
    </main>

</body>

</html>
